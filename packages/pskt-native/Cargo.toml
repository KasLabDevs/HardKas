[package]
name = "hardkas-pskt-native"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2.16.12", default-features = false, features = ["napi4"] }
napi-derive = "2.16.12"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
base64 = "0.22"
kaspa-wallet-pskt = { git = "https://github.com/kaspanet/rusty-kaspa", rev = "78257f273a26c4be085bab0f79437dee99ca8835" }
hex = "0.4.3"
sha2 = "0.11.0"
kaspa-consensus-core = { git = "https://github.com/kaspanet/rusty-kaspa", rev = "78257f273a26c4be085bab0f79437dee99ca8835", version = "2.0.1" }
kaspa-wallet-core = { git = "https://github.com/kaspanet/rusty-kaspa", rev = "78257f273a26c4be085bab0f79437dee99ca8835", version = "2.0.1" }
kaspa-txscript = { git = "https://github.com/kaspanet/rusty-kaspa", rev = "78257f273a26c4be085bab0f79437dee99ca8835", version = "2.0.1" }
kaspa-addresses = { git = "https://github.com/kaspanet/rusty-kaspa", rev = "78257f273a26c4be085bab0f79437dee99ca8835", version = "2.0.1" }
secp256k1 = { version = "0.29.0", features = ["global-context", "rand-std"] }
zeroize = { version = "1.8", features = ["zeroize_derive"] }

[build-dependencies]
napi-build = "2.1.3"

[[bin]]
name = "generate-fixture"
path = "src/bin/generate_fixture.rs"

[[bin]]
name = "generate-multisig-fixture"
path = "src/bin/generate_multisig_fixture.rs"

[[bin]]
name = "generate-pskt"
path = "src/bin/generate_pskt.rs"

[[bin]]
name = "sign-p2pk-tx"
path = "src/bin/sign_p2pk_tx.rs"
