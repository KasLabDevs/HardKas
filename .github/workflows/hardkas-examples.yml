name: HardKAS Examples CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-examples:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9.15.4

    - name: Install dependencies
      run: pnpm install

    - name: Typecheck
      run: pnpm typecheck

    - name: Build packages
      run: pnpm build

    - name: Run unit tests
      run: pnpm test

    - name: Example 01 - Hello Kaspa
      run: pnpm example:hello

    - name: Example 02 - Basic Transfer
      run: pnpm example:transfer

    - name: Example 03 - Localnet Demo
      run: pnpm example:localnet

    - name: Example 04 - Trace & Replay
      run: pnpm example:trace

    - name: Example 05 - Snapshot & Restore
      run: pnpm example:snapshot

    - name: Example 06 - RPC Node Health
      # Note: This might fail if no node is running in CI environment
      # We'll allow it to continue or skip if needed
      run: pnpm example:rpc-health || echo "Node health skipped (no local node in runner)"

    - name: Example 07 - Failure Debugging
      run: pnpm example:failure

    - name: Example 08 - Igra L2 Readonly
      run: pnpm example:igra-readonly

    - name: Example 09 - Bridge Assumptions
      run: pnpm example:bridge-assumptions

    - name: Example 10 - CI Workflow
      run: pnpm example:ci
