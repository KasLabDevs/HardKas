name: CI Parity (Cross-Platform Truth Equivalence)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  semantic-equivalence:
    name: Cross-Platform Semantic Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install

      - name: Build Monorepo
        run: pnpm build

      - name: Run Torture Matrix (Seed 42)
        run: pnpm hardkas torture matrix --iterations 300 --seed 42

      - name: Run Torture Matrix (Seed 999)
        run: pnpm hardkas torture matrix --iterations 300 --seed 999

      - name: Run Abuse & Fault Injection Tests
        run: pnpm vitest run abuse-multiprocess soak-longrun fault-injection

      - name: Run Benchmarks
        run: pnpm vitest run benchmark
        env:
          BENCHMARK_CI: true

      - name: Generate Global Semantic Hash
        id: verify
        run: |
          pnpm hardkas verify-semantics --ci-mode > semantic_output.txt
          cat semantic_output.txt
        shell: bash

      - name: Upload Telemetry and Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: torture-reports-${{ matrix.os }}
          path: |
            .hardkas/reports/
            .hardkas/telemetry/telemetry.jsonl
            semantic_output.txt
